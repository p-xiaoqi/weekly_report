server:
  port: "8080"
  mode: debug

feishu:
  app_id: "${FEISHU_APP_ID}"
  app_secret: "${FEISHU_APP_SECRET}"
  redirect_uri: "${FEISHU_REDIRECT_URI}"
  # OAuth 授权申请的权限范围（空格分隔）。留空将使用内置默认值。
  # 不申请 scope 时 user_access_token 只有最小默认权限，会导致任务/日历/文档拉不到数据。
  # 这些权限同时需要在开放平台「权限管理」中开通并发布版本，用户重新登录授权后才生效。
  scopes: "${FEISHU_SCOPES}"  # 默认: contact:user.base:readonly task:task:readonly calendar:calendar:readonly drive:drive docx:document

database:
  path: "weekly_report.db"
  max_open_conns: 1
  max_idle_conns: 1

jwt:
  secret: "${JWT_SECRET}"
  expire_hours: 168

log:
  level: info
  output: stdout

reminder:
  enabled: true
  cron: "0 0 10 * * 5"
  bot_webhook: "${FEISHU_BOT_WEBHOOK}"
  bot_secret: "${REMINDER_BOT_SECRET}"
  # use_app=true 时改用"应用身份(App ID/Secret)"经 im API 发消息，无需 webhook 加签。
  # 测试提醒会私信当前登录管理员本人；定时提醒发到 chat_id（留空则逐一私信未提交用户）。
  use_app: false        # 也可用环境变量 REMINDER_USE_APP=true 开启
  chat_id: "${REMINDER_CHAT_ID}"  # 定时提醒目标群 chat_id（oc_xxx），支持逗号分隔多个群，可留空

# 管理员白名单（用于 /api/v1/admin/* 接口，如"测试提醒"）。
# 与"飞书群管理员"无关：这是本系统自有的管理员授权名单。
# 逗号分隔，留空表示无人通过白名单授权（除非用户 Role 已是 admin）。
admin:
  emails: "${ADMIN_EMAILS}"     # 例如 "alice@example.com,bob@example.com"
  open_ids: "${ADMIN_OPEN_IDS}" # 例如 "ou_xxx,ou_yyy"（飞书 open_id）
