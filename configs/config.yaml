server:
  port: "8080"
  mode: debug

feishu:
  app_id: "${FEISHU_APP_ID}"
  app_secret: "${FEISHU_APP_SECRET}"
  redirect_uri: "${FEISHU_REDIRECT_URI}"

database:
  path: "weekly_report.db"
  max_open_conns: 1
  max_idle_conns: 1

jwt:
  secret: "${JWT_SECRET}"
  expire_hours: 168

log:
  level: info
  output: stdout

reminder:
  enabled: true
  cron: "0 0 10 * * 5"
  bot_webhook: "${FEISHU_BOT_WEBHOOK}"
  bot_secret: ""
